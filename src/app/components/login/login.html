<div class="min-h-screen bg-gradient-to-br from-blue-900 to-blue-700 flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-2xl p-10 w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-blue-900">Horizontes sin Límites</h1>
      <p class="text-gray-500 mt-2">Agencia de Viajes</p>
    </div>

    <div *ngIf="error" class="bg-red-100 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
      {{ error }}
    </div>

    <div class="mb-5">
      <label class="block text-gray-700 font-medium mb-1">Usuario</label>
      <input
        type="text"
        [(ngModel)]="nombre"
        placeholder="Ingresa tu usuario"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <div class="mb-6">
      <label class="block text-gray-700 font-medium mb-1">Contraseña</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Ingresa tu contraseña"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        (keyup.enter)="login()"
      />
    </div>

    <button
      (click)="login()"
      [disabled]="cargando"
      class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 rounded-lg transition duration-200 disabled:opacity-50">
      {{ cargando ? 'Ingresando...' : 'Ingresar' }}
    </button>

  </div>
</div>
